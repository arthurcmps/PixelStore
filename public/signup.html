<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Pixel Store</title>
    
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/signup.css">
</head>

<body>
    <header id="meu-cabecalho"></header>

    <div id="main-container">
      <h1>Cadastre-se para aceder ao sistema</h1>
      <form id="register-form">
          <div class="full-box">
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email" placeholder="Digite o seu e-mail" required>
          </div>
          <div class="half-box spacing">
              <label for="name">Nome</label>
              <input type="text" name="nome" id="nome" placeholder="Digite o seu nome" required>
          </div>
          <div class="half-box">
              <label for="lastname">Sobrenome</label>
              <input type="text" name="sobrenome" id="sobrenome" placeholder="Digite o seu sobrenome" required>
          </div>
          <div class="half-box spacing">
            <label for="lastname">Senha</label>
            <input type="password" name="senha" id="senha" placeholder="Crie uma senha" required>
          </div>
          <div class="half-box">
            <label for="passconfirmation">Confirmação de senha</label>
            <input type="password" name="passconfirmation" id="passwordconfirmation" placeholder="Repita a senha" required>
          </div>
          <div class="full-box" style="margin-bottom: 25px; display: flex; align-items: center;">
            <input type="checkbox" name="termos_aceitos" id="agreement" style="width: auto; margin-right: 10px; margin-bottom: 0;" required>
            <label for="agreement" id="agreement-label" style="margin-bottom: 0;">Eu li e aceito os <a href="#">termos de uso</a></label>
          </div>
          <div class="full-box">
            <input id="btn-submit" type="submit" value="Registrar Conta">
          </div>
      </form>
    </div>

    <footer class="footer" id="meu-rodape"></footer>

    <script type="module" src="js/signup.js"></script>
    <script src="js/layout.js"></script>
    <script type="module" src="js/auth_state.js"></script>
</body>
</html>
